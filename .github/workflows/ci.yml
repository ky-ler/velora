name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-test:
    name: API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Pre-pull Testcontainers PostgreSQL image
        run: docker pull postgres:18-alpine

      - run: chmod +x ./mvnw
      - run: ./mvnw verify -B

  client-lint:
    name: Client Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_URL: https://placeholder.example.com/api
          VITE_AUTH0_DOMAIN: placeholder.example.com
          VITE_AUTH0_CLIENT_ID: placeholder
          VITE_AUTH0_AUDIENCE: placeholder
          VITE_AUTH0_CALLBACK_URL: https://placeholder.example.com/callback
